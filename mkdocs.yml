site_name: インプット読本
site_description: 書籍をジャンル別にリライトした読本集

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  font:
    text: Noto Sans JP
    code: Roboto Mono

nav:
  - ホーム: index.md
  - 不動産業界:
    - 読本一覧: fudosan/index.md
    - Vol.1 業界の全体地図: fudosan/vol1.md
    - Vol.2 業界人のリアル: fudosan/vol2.md
    - Vol.3 テクノロジーが変える不動産業: fudosan/vol3.md
    - Vol.4 消費者から見た不動産取引: fudosan/vol4.md
    - Vol.5 業界の面白話と裏側: fudosan/vol5.md
  - プロダクトマネジメント:
    - 読本一覧: product-management/index.md
    - Vol.1 PM入門と思考法: product-management/vol1.md
    - Vol.2 プロダクト戦略と発見: product-management/vol2.md
    - Vol.3 チームと組織を動かす: product-management/vol3.md
    - Vol.4 PMFと新規事業: product-management/vol4.md

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
